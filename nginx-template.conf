# Template Nginx Configuration for ONNIEONE NEWS
# Save this in /etc/nginx/sites-available/onnieone and symlink to sites-enabled
# Ensure you update the domain name and SSL certificate paths

server {
    listen 80;
    server_name onnieone.com www.onnieone.com;
    
    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name onnieone.com www.onnieone.com;

    # SSL Certificates (managed by Certbot usually)
    # ssl_certificate /etc/letsencrypt/live/onnieone.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/onnieone.com/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    
    # Optimize static asset delivery directly via Nginx
    location /css/ {
        alias /var/www/onnieone-news/public/css/;
        expires 30d;
        access_log off;
    }
    
    location /uploads/ {
        alias /var/www/onnieone-news/public/uploads/;
        expires 30d;
        access_log off;
    }

    # Pass primary application traffic to Node.js backend running via PM2
    location / {
        proxy_pass http://localhost:1000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real-IP forwarding for correct rate-limiting
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
